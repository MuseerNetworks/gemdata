<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Offline | GemData</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 26%), linear-gradient(180deg, #f8fbff, #eef4fb);
      color: #0f172a;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      width: min(100%, 520px);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
      padding: 32px;
    }
    .mark {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #38bdf8, #2dd4bf);
      color: #083344;
      font-weight: 800;
      font-size: 22px;
    }
    h1 {
      margin: 20px 0 0;
      font-size: 32px;
      line-height: 1.1;
    }
    p {
      margin: 14px 0 0;
      color: #475569;
      line-height: 1.7;
    }
    a {
      display: inline-flex;
      margin-top: 24px;
      padding: 13px 18px;
      border-radius: 14px;
      background: #0f172a;
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="mark">G</div>
    <h1>You’re offline.</h1>
    <p>GemData can still show cached pages, but wallet funding, purchases, and other financial actions require a live network connection before they can be submitted safely.</p>
    <a href="/">Return to GemData</a>
  </section>
</body>
</html>
