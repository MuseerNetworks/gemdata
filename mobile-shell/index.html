<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1B4DFF">
  <title>GemData</title>
  
  <!-- Premium Stylesheets -->
  <link rel="stylesheet" href="assets/css/mobile.css">
</head>
<body>

  <!-- Offline Status Banner -->
  <div id="offline-banner" class="offline-banner" role="alert">
    No Internet Connection. Offline mode enabled.
  </div>

  <!-- Main SPA Container -->
  <div id="app-container">
    <!-- Instant load splash loading template screen -->
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: var(--color-bg);">
      <div style="width: 72px; height: 72px; display: grid; place-items: center; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 20px; box-shadow: var(--shadow-md); margin-bottom: 16px;">
        <span style="font-size: 2rem; font-weight: 900; color: var(--color-primary);">G</span>
      </div>
      <h2 style="font-size: 1.5rem; font-weight: 800; color: var(--color-text);">GemData</h2>
      <div style="width: 24px; height: 24px; border: 3px solid var(--color-primary-soft); border-top-color: var(--color-primary); border-radius: 99px; animation: spin 800ms linear infinite; margin-top: 16px;"></div>
    </div>
  </div>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Capacitor Native bridge script (Auto-injected by Capacitor in Native mode, placeholder here) -->
  <script src="capacitor.js" onerror="console.info('Running in browser context.')"></script>

  <!-- Core App Libraries -->
  <script src="assets/js/api.js"></script>
  <script src="assets/js/router.js"></script>

  <!-- View Screens -->
  <script src="assets/js/screens/login.js"></script>
  <script src="assets/js/screens/dashboard.js"></script>
  <script src="assets/js/screens/wallet.js"></script>
  <script src="assets/js/screens/buy.js"></script>
  <script src="assets/js/screens/profile.js"></script>
  <script src="assets/js/screens/transactions.js"></script>

  <!-- Bootstrap Application controller -->
  <script src="assets/js/app.js"></script>
</body>
</html>
