<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTU Wallet Funding</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbff, #eef4fb);
      color: #0f172a;
    }

    .card {
      width: min(28rem, calc(100vw - 2rem));
      padding: 2rem;
      border-radius: 1.25rem;
      background: #ffffff;
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
    }

    label {
      display: grid;
      gap: 0.45rem;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    input,
    button {
      width: 100%;
      padding: 0.95rem 1rem;
      border-radius: 0.9rem;
      border: 1px solid #cbd5e1;
      font-size: 1rem;
      box-sizing: border-box;
    }

    button {
      border: 0;
      background: #0f172a;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
    }

    #message {
      margin-top: 1rem;
      color: #475569;
      min-height: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Fund Wallet</h1>
    <p>Enter a user email and amount. The backend will initialize the payment with Paystack and redirect you safely.</p>

    <form id="pay-form">
      <label>
        Email
        <input type="email" id="email" value="customer@example.com" required>
      </label>

      <label>
        Amount (NGN)
        <input type="number" id="amount" min="1" step="0.01" placeholder="5000" required>
      </label>

      <button type="submit">Fund Wallet</button>
    </form>

    <p id="message"></p>
  </div>

  <script>
    const form = document.getElementById('pay-form');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = 'Initializing payment...';

      try {
        const response = await fetch('/api/pay', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            amount: document.getElementById('amount').value
          })
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.message || 'Unable to initialize payment.');
        }

        window.location.href = payload.authorization_url;
      } catch (error) {
        message.textContent = error.message;
      }
    });
  </script>
</body>
</html>
